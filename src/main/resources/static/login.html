<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>
<body>

<h2>Iniciar sesión</h2>

<form id="loginForm">
  <input type="text" id="usuario" placeholder="Usuario" required>
  <br><br>
  <input type="password" id="password" placeholder="Contraseña" required>
  <br><br>
  <button type="submit">Entrar</button>
</form>

<p id="mensaje"></p>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const usuario = document.getElementById("usuario").value;
    const password = document.getElementById("password").value;

    const usuarioRegistrado = localStorage.getItem("usuario");
    const passwordRegistrado = localStorage.getItem("password");

    if(!usuarioRegistrado){
        // No existe usuario registrado
        window.location.href = "registro.html";
        return;
    }

    if(usuario === usuarioRegistrado && password === passwordRegistrado){
        document.getElementById("mensaje").innerText = "Login correcto";
    } else {
        document.getElementById("mensaje").innerText = "Datos incorrectos";
    }
});
</script>

</body>
</html>
